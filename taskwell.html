<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Taskwell" />
  <title>Taskwell</title>
  <style>
    :root {
      --cream: #F5F0E8; --cream-dark: #EDE6D6;
      --rose: #C4907A; --rose-dark: #A67055; --rose-pale: #E8C4B4;
      --ink: #2E2118; --ink-soft: #6B5744; --ink-faint: #B8A898;
      --sage: #9CAF9A; --sage-dark: #7A9478; --sage-pale: #D8E5D6;
      --khaki: #C4B99A; --khaki-pale: #EDE7DA;
      --brown: #A67B5B;
      --rust: #B85C38; --paper: #FAF7F2;
      --rose: #C4A4A0; --rose-dark: #A67B5B; --rose-pale: #EDE0DB;
      --accent: var(--rose); --accent-dark: var(--rose-dark); --accent-pale: var(--rose-pale);
      --rail-bg: var(--brown);
      --tab-w: 64px;
    }
    body.ctx-home {
      --accent: var(--sage); --accent-dark: var(--sage-dark); --accent-pale: var(--sage-pale);
      --rail-bg: var(--sage);
    }
    body.ctx-all {
      --accent: var(--khaki); --accent-dark: #9A8E78; --accent-pale: var(--khaki-pale);
      --rail-bg: var(--khaki);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: var(--cream-dark); font-family: Georgia, serif; color: var(--ink);
           height: 100dvh; display: flex; overflow: hidden; }

    /* ── Rail ── */
    .rail { width: var(--tab-w); background: var(--rail-bg); display: flex; flex-direction: column;
            align-items: center; padding: 12px 0 24px; gap: 2px; flex-shrink: 0; z-index: 10;
            transition: background .3s; overflow-y: auto; overflow-x: hidden; }
    .app-mark { width: 34px; height: 34px; background: var(--cream); border-radius: 8px;
                display: flex; align-items: center; justify-content: center; margin-bottom: 6px;
                font-size: 16px; color: var(--accent); font-weight: bold; cursor: pointer;
                border: 2px solid transparent; transition: all .15s; flex-shrink: 0; }
    .app-mark:hover, .app-mark.active { border-color: rgba(255,255,255,0.5); }
    .ctx-switcher { display: flex; flex-direction: column; gap: 2px; width: 100%; align-items: center;
                    margin-bottom: 4px; }
    .ctx-btn { width: 48px; border-radius: 10px; border: none; cursor: pointer;
               display: flex; flex-direction: column; align-items: center; justify-content: center;
               gap: 2px; padding: 6px 4px; transition: background .15s; background: transparent;
               color: var(--ink); flex-shrink: 0; }
    .ctx-btn svg { width: 19px; height: 19px; stroke: var(--ink); fill: none;
                   stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .ctx-btn span { font-size: 8px; font-family: 'Helvetica Neue', sans-serif;
                    letter-spacing: .04em; text-transform: uppercase; color: var(--ink); }
    .ctx-btn.active { background: rgba(255,255,255,0.28); }
    .ctx-btn:hover { background: rgba(255,255,255,0.2); }
    .rail-divider { width: 32px; height: 1px; background: rgba(255,255,255,0.25); margin: 4px 0; flex-shrink: 0; }
    .tab-btn { width: 48px; border-radius: 10px; border: none; cursor: pointer;
               display: flex; flex-direction: column; align-items: center; justify-content: center;
               gap: 3px; padding: 8px 4px; transition: background .15s; background: transparent; flex-shrink: 0; }
    .tab-btn svg { width: 22px; height: 22px; stroke: var(--ink); fill: none;
                   stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .tab-btn span { font-size: 9px; font-family: 'Helvetica Neue', sans-serif;
                    letter-spacing: .04em; text-transform: uppercase; color: var(--ink); }
    .tab-btn.active { background: rgba(255,255,255,0.28); }
    .tab-btn:hover { background: rgba(255,255,255,0.2); }

    /* ── Main ── */
    .main { flex: 1; overflow: hidden; display: flex; flex-direction: column; background: var(--paper); }
    .section { display: none; flex: 1; overflow: hidden; flex-direction: column; }
    .section.active { display: flex; }
    .page-header { padding: 18px 20px 0; flex-shrink: 0; display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
    .page-title { font-size: 26px; font-weight: normal; color: var(--ink); }
    .page-sub { font-size: 12px; font-family: 'Helvetica Neue', sans-serif; color: var(--ink-soft); }

    /* ── Buttons ── */
    .btn { padding: 6px 14px; border-radius: 8px; border: 1.5px solid var(--cream-dark);
           background: var(--cream); color: var(--ink); font-family: 'Helvetica Neue', sans-serif;
           font-size: 12px; cursor: pointer; transition: all .15s; }
    .btn:hover { background: var(--cream-dark); }
    .btn-primary { background: var(--cream); border-color: var(--ink-faint); color: var(--ink); font-weight: 600; }
    .btn-primary:hover { background: var(--cream-dark); }
    .btn-sm { padding: 3px 10px; font-size: 11px; }
    .btn-accent { background: var(--accent); border-color: var(--accent-dark); color: white; }
    .btn-accent:hover { background: var(--accent-dark); }

    /* ── HUB ── */
    #hub .hub-controls { display: flex; align-items: center; gap: 8px; padding: 10px 20px 0; flex-shrink: 0; flex-wrap: wrap; }
    #hub .scroll-area { flex: 1; overflow-y: auto; padding: 0 20px 24px; -webkit-overflow-scrolling: touch; }
    .section-block { margin-top: 20px; }
    .section-hdr { display: flex; align-items: center; gap: 0; cursor: pointer;
                   user-select: none; margin-bottom: 10px; }
    .section-hdr-bar { width: 3px; background: var(--accent); border-radius: 2px; align-self: stretch; flex-shrink: 0; }
    .section-hdr-left { display: flex; align-items: center; gap: 6px; font-family: 'Helvetica Neue', sans-serif;
                        font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
                        color: var(--ink-soft); padding: 4px 10px; }
    .section-hdr-right { display: none; }
    .section-body { display: flex; flex-wrap: wrap; gap: 10px; }
    .list-block { background: var(--cream); border: 1px solid var(--cream-dark); border-radius: 8px;
                  flex: 1 1 240px; min-width: 220px; max-width: 100%; overflow: hidden; }
    .list-hdr { display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none;
                padding: 10px 12px 6px; }
    .list-name { font-family: 'Helvetica Neue', sans-serif; font-size: 13px; font-weight: 700; color: var(--ink); flex: 1; }
    .list-count { background: var(--accent-pale); color: var(--ink); font-size: 10px;
                  font-family: 'Helvetica Neue', sans-serif; padding: 1px 6px; border-radius: 10px; flex-shrink: 0; }
    .list-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .list-dot.work { background: var(--rose); }
    .list-dot.home { background: var(--sage); }
    .list-del { font-size: 14px; color: var(--ink-faint); background: none; border: none; cursor: pointer; padding: 0 2px; flex-shrink: 0; }
    .list-del:hover { color: var(--rust); }
    .list-body { padding: 0 12px 10px; }
    .task-input-row { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
    .task-input { flex: 1; min-width: 120px; padding: 7px 10px; border: 1.5px solid var(--cream-dark);
                  border-radius: 8px; background: var(--cream); font-family: Georgia, serif;
                  font-size: 13px; color: var(--ink); outline: none; }
    .task-input:focus { border-color: var(--accent); }
    .due-input { padding: 7px 8px; border: 1.5px solid var(--cream-dark); border-radius: 8px;
                 background: var(--cream); font-family: 'Helvetica Neue', sans-serif;
                 font-size: 11px; color: var(--ink); outline: none; width: 96px; }
    .due-input:focus { border-color: var(--accent); }
    .task-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--cream-dark); }
    .task-check { width: 18px; height: 18px; border: 1.5px solid var(--accent); border-radius: 50%;
                  flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; }
    .task-check.done { background: var(--accent); border-color: var(--accent); }
    .task-check.done::after { content: ''; display: block; width: 4px; height: 7px;
                               border: 2px solid white; border-top: none; border-left: none;
                               transform: rotate(45deg) translateY(-1px); }
    .task-text { flex: 1; font-size: 13px; color: var(--ink); }
    .task-text.done { text-decoration: line-through; color: var(--ink-faint); }
    .due-badge { font-size: 10px; font-family: 'Helvetica Neue', sans-serif; padding: 2px 7px; border-radius: 10px; flex-shrink: 0; }
    .due-badge.overdue { background: var(--rust); color: white; }
    .due-badge.today { background: var(--accent-pale); color: var(--ink); }
    .due-badge.soon { background: var(--cream-dark); color: var(--ink-soft); }
    .task-edit { background: none; border: none; color: var(--ink-faint); font-size: 14px; cursor: pointer; padding: 0 2px; flex-shrink: 0; line-height: 1; }
    .task-edit:hover { color: var(--accent); }
    .task-del { background: none; border: none; color: var(--ink-faint); font-size: 16px; cursor: pointer; padding: 0 2px; flex-shrink: 0; }
    .task-del:hover { color: var(--rust); }
    .done-section { margin-top: 8px; }
    .done-hdr { display: flex; align-items: center; justify-content: space-between;
                font-family: 'Helvetica Neue', sans-serif; font-size: 11px; color: var(--ink-faint); }
    .no-tasks { font-family: Georgia, serif; font-size: 12px; font-style: italic; color: var(--ink-faint); padding: 6px 0; }
    .empty-section { font-family: Georgia, serif; font-size: 12px; font-style: italic; color: var(--ink-faint); padding: 8px 12px; }
    .divider { border: none; border-top: 1px solid var(--cream-dark); margin: 6px 0; }

    /* ── WEEK ── */
    #week .week-controls { padding: 10px 20px 0; flex-shrink: 0; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .week-nav-row { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    #week .pending-area { background: var(--cream); margin: 10px 20px 0; padding: 10px; border-radius: 8px; flex-shrink: 0; }
    .pending-label { font-family: 'Helvetica Neue', sans-serif; font-size: 10px; text-transform: uppercase;
                     letter-spacing: .06em; color: var(--ink-faint); margin-bottom: 8px; }
    .pending-chips { display: flex; flex-wrap: wrap; gap: 6px; min-height: 28px; }
    .chip { padding: 4px 10px; border-radius: 20px; background: var(--cream-dark); border: 1px solid var(--accent);
            font-family: 'Helvetica Neue', sans-serif; font-size: 11px; color: var(--ink); cursor: grab;
            user-select: none; transition: all .15s; touch-action: none; }
    .chip:hover { background: var(--accent-pale); }
    .chip.dragging { opacity: .5; }
    .week-scroll { flex: 1; overflow-x: auto; overflow-y: hidden; padding: 10px 20px 16px; -webkit-overflow-scrolling: touch; }
    .week-grid { display: flex; gap: 8px; height: 100%; min-width: max-content; }
    .day-col { width: 160px; flex-shrink: 0; border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; }
    .day-col.today { border: 2px solid var(--accent); }
    .day-hdr { padding: 8px 10px; display: flex; justify-content: space-between; align-items: center;
               background: var(--cream-dark); flex-shrink: 0; }
    .day-col.today .day-hdr { background: var(--accent-pale); }
    .day-hdr-name { font-family: 'Helvetica Neue', sans-serif; font-size: 12px; font-weight: 700;
                    color: var(--ink); text-transform: uppercase; letter-spacing: .05em; }
    .day-hdr-date { font-family: 'Helvetica Neue', sans-serif; font-size: 11px; color: var(--ink-soft); }
    .day-body { flex: 1; background: var(--cream); padding: 8px; overflow-y: auto;
                min-height: 200px; transition: background .15s; -webkit-overflow-scrolling: touch; touch-action: pan-y; }
    .day-body.drag-over { background: var(--accent-pale); }
    .day-empty { font-family: Georgia, serif; font-size: 11px; font-style: italic; color: var(--ink-faint); padding: 6px 0; }
    .week-task { background: var(--paper); border-radius: 6px; padding: 6px 8px; margin-bottom: 6px; cursor: grab; touch-action: none; }
    .week-task.dragging { opacity: .5; }
    .week-task-title { font-size: 12px; color: var(--ink); margin-bottom: 2px; }
    .week-task-title.done { text-decoration: line-through; color: var(--ink-faint); }
    .week-task-meta { display: flex; align-items: center; gap: 4px; }
    .week-task-list { font-size: 10px; font-family: 'Helvetica Neue', sans-serif; color: var(--ink-faint); flex: 1; }
    .week-task-date { font-size: 10px; font-family: 'Helvetica Neue', sans-serif; color: var(--ink-faint); }
    .week-task-remove { background: none; border: none; color: var(--ink-faint); font-size: 13px; cursor: pointer; padding: 0; }
    .week-task-remove:hover { color: var(--rust); }

    /* ── DAY VIEW ── */
    #day .day-view-inner { flex: 1; overflow: hidden; display: flex; }
    .day-agenda { flex: 1; overflow-y: auto; padding: 16px 20px 24px; -webkit-overflow-scrolling: touch; }
    .day-sidebar { width: 210px; flex-shrink: 0; border-left: 1px solid var(--cream-dark);
                   display: flex; flex-direction: column; overflow: hidden; background: var(--paper); }
    .mini-cal { padding: 12px; flex-shrink: 0; }
    .mini-cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .mini-cal-title { font-family: 'Helvetica Neue', sans-serif; font-size: 12px; font-weight: 700; color: var(--ink); }
    .mini-cal-nav { background: none; border: none; color: var(--ink-soft); cursor: pointer; font-size: 16px; padding: 2px 6px; line-height: 1; }
    .mini-cal-nav:hover { color: var(--ink); }
    .mini-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; }
    .mini-cal-dow { font-family: 'Helvetica Neue', sans-serif; font-size: 9px; font-weight: 700; text-align: center;
                    color: var(--ink-faint); padding: 3px 0; text-transform: uppercase; }
    .mini-cal-day { font-family: 'Helvetica Neue', sans-serif; font-size: 11px; text-align: center;
                    padding: 4px 2px; border-radius: 6px; cursor: pointer; color: var(--ink); position: relative; }
    .mini-cal-day:hover { background: var(--cream-dark); }
    .mini-cal-day.is-today { background: var(--accent-pale); font-weight: 700; }
    .mini-cal-day.is-selected { background: var(--accent); color: white; }
    .mini-cal-day.other-month { color: var(--ink-faint); }
    .mini-cal-day.has-tasks::after { content: '·'; display: block; font-size: 14px; color: var(--accent);
                                      line-height: .6; margin-top: -2px; }
    .mini-cal-day.is-selected::after { color: white; }
    .agenda-day-title { font-size: 20px; font-weight: normal; color: var(--ink); margin-bottom: 14px; }
    .agenda-section-label { font-family: 'Helvetica Neue', sans-serif; font-size: 10px; text-transform: uppercase;
                             letter-spacing: .08em; color: var(--ink-faint); margin: 12px 0 6px; }
    .agenda-event { background: var(--cream); border-radius: 8px; padding: 8px 12px;
                    margin-bottom: 6px; border-left: 3px solid var(--accent); }
    .agenda-event-time { font-family: 'Helvetica Neue', sans-serif; font-size: 11px; color: var(--ink-soft); margin-bottom: 2px; }
    .agenda-event-title { font-size: 13px; color: var(--ink); }
    .agenda-task { background: var(--cream); border-radius: 8px; padding: 8px 10px;
                   margin-bottom: 6px; display: flex; align-items: center; gap: 8px; border: none; }
    .agenda-task-info { flex: 1; }
    .agenda-task-title { font-size: 13px; color: var(--ink); }
    .agenda-task-list { font-size: 10px; font-family: 'Helvetica Neue', sans-serif; color: var(--ink-faint); margin-top: 1px; }
    .agenda-empty { font-family: Georgia, serif; font-size: 13px; font-style: italic; color: var(--ink-faint); padding: 20px 0; }

    /* ── CAL EVENTS ── */
    .cal-event { border-radius: 4px; padding: 3px 7px; margin-bottom: 4px; font-size: 11px;
                 font-family: 'Helvetica Neue', sans-serif; color: white; display: flex;
                 align-items: center; gap: 4px; overflow: hidden; }
    .cal-event-time { font-size: 9px; opacity: .85; white-space: nowrap; flex-shrink: 0; }
    .cal-event-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .agenda-cal-event { background: var(--cream); border-radius: 8px; padding: 8px 12px;
                        margin-bottom: 6px; }
    .agenda-cal-time { font-family: 'Helvetica Neue', sans-serif; font-size: 11px; color: var(--ink-soft); margin-bottom: 2px; }
    .agenda-cal-title { font-size: 13px; color: var(--ink); }
    .cal-feed-item { display: flex; align-items: center; gap: 8px; padding: 8px 0;
                     border-bottom: 1px solid var(--cream-dark); }
    .cal-feed-color { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .cal-feed-name { font-size: 13px; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cal-feed-url { font-size: 10px; color: var(--ink-faint); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cal-feeds-list { max-height: 200px; overflow-y: auto; margin: 8px 0 10px; }
    .modal.modal-wide { max-width: 440px; width: 90vw; }

    /* ── INBOX ── */
    #inbox .inbox-inner { flex: 1; overflow: hidden; display: flex; flex-direction: column; padding: 14px 20px 20px; }
    .inbox-input-row { display: flex; gap: 8px; margin-bottom: 12px; flex-shrink: 0; }
    .inbox-input { flex: 1; padding: 8px 12px; border: 1.5px solid var(--cream-dark);
                   border-radius: 8px; background: var(--cream); font-family: Georgia, serif;
                   font-size: 13px; color: var(--ink); outline: none; }
    .inbox-input:focus { border-color: var(--accent); }
    .inbox-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .inbox-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--cream-dark); }
    .inbox-check { width: 18px; height: 18px; border: 1.5px solid var(--accent); border-radius: 50%;
                   flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; }
    .inbox-check.done { background: var(--accent); border-color: var(--accent); }
    .inbox-check.done::after { content: ''; display: block; width: 4px; height: 7px;
                                border: 2px solid white; border-top: none; border-left: none;
                                transform: rotate(45deg) translateY(-1px); }
    .inbox-item-text { flex: 1; font-size: 13px; color: var(--ink); }
    .inbox-item-text.done { text-decoration: line-through; color: var(--ink-faint); }

    /* ── Modal ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(46,33,24,.4); display: flex;
                     align-items: center; justify-content: center; z-index: 100; padding: 24px;
                     opacity: 0; pointer-events: none; transition: opacity .2s; }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal { background: var(--paper); border-radius: 16px; padding: 22px; width: 100%; max-width: 340px;
             box-shadow: 0 20px 60px rgba(46,33,24,.2); }
    .modal-title { font-size: 19px; font-weight: normal; color: var(--ink); margin-bottom: 14px; }
    .modal-input { width: 100%; padding: 9px 12px; border: 1.5px solid var(--cream-dark); border-radius: 8px;
                   background: var(--cream); font-family: Georgia, serif; font-size: 14px; color: var(--ink);
                   outline: none; margin-bottom: 10px; }
    .modal-input:focus { border-color: var(--accent); }
    .modal-select { width: 100%; padding: 9px 12px; border: 1.5px solid var(--cream-dark); border-radius: 8px;
                    background: var(--cream); font-family: 'Helvetica Neue', sans-serif; font-size: 13px;
                    color: var(--ink); outline: none; margin-bottom: 14px; }
    .modal-label { font-family: 'Helvetica Neue', sans-serif; font-size: 11px; color: var(--ink-soft); margin-bottom: 4px; display: block; }
    .modal-row { display: flex; gap: 10px; margin-top: 4px; }

    /* ── Toast / Loading ── */
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(60px);
             background: var(--ink); color: var(--cream); font-family: 'Helvetica Neue', sans-serif;
             font-size: 12px; padding: 8px 18px; border-radius: 20px; z-index: 200;
             opacity: 0; transition: all .3s; white-space: nowrap; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .loading { position: fixed; inset: 0; background: var(--paper); display: flex;
               align-items: center; justify-content: center; flex-direction: column; gap: 12px;
               z-index: 300; transition: opacity .4s; }
    .loading.hidden { opacity: 0; pointer-events: none; }
    .spinner { width: 26px; height: 26px; border: 2.5px solid var(--cream-dark);
               border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-family: 'Helvetica Neue', sans-serif; font-size: 12px; color: var(--ink-soft); }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--cream-dark); border-radius: 4px; }

    /* ── Touch sizes ── */
    .tab-btn { min-height: 52px; }
    .ctx-btn { min-height: 38px; }
    .task-check, .inbox-check { width: 24px; height: 24px; flex-shrink: 0; }
    .btn { min-height: 36px; }
    .btn-sm { min-height: 32px; }
    .chip { min-height: 36px; display: flex; align-items: center; }
    .day-body { min-height: 250px; }
    input, textarea, select { font-size: 16px !important; }

    /* ── Responsive ── */
    @media (max-width: 620px) {
      body { flex-direction: column; }
      .rail { width: 100%; height: auto; min-height: 56px; flex-direction: row; padding: 6px 8px;

<script>
// ── Config ──
const SB_URL = 'https://vblmnfjbtoeeytmzgbaf.supabase.co';
const SB_KEY = 'sb_publishable_s9VIKwo6dnfrcpM-5KjEMg_NEPGzhFU';
const HDRS = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`,
               'Content-Type': 'application/json', 'Prefer': 'return=representation' };
const WORK_SECTIONS = ['Service','Teaching','Research','Misc'];

// Calendar OAuth — fill in your client IDs to enable calendar sync.
// ── State ──
let lists = [], tasks = [], inboxItems = [];
let sectionCollapsed = {}, listCollapsed = {}, dragTaskId = null;
let weekOffset = 0, activeWeekList = 'all';
let currentContext = localStorage.getItem('tw_context') || 'work';
let editingTaskId = null, pendingMoveIdx = null;
let selectedDay = dateKey(new Date());
let miniMonthDate = new Date();
let calFeeds = JSON.parse(localStorage.getItem('tw_cal_feeds') || '[]');
let calEvents = {};

// ── Helpers ──
function getVisibleLists() {
  if (currentContext === 'all') return lists;
  return lists.filter(l => (l.context || 'work') === currentContext);
}
function dateKey(d) { return d.toISOString().split('T')[0]; }
function parseDate(val) {
  if (!val || !val.trim()) return null;
  const parts = val.split('/');
  if (parts.length === 3) {
    const y = parts[2].length === 2 ? '20' + parts[2] : parts[2];
    return `${y}-${parts[0].padStart(2,'0')}-${parts[1].padStart(2,'0')}`;
  }
  return null;
}
function fmtDisplay(iso) {
  if (!iso) return '';
  const [y,m,d] = iso.split('-');
  return `${m}/${d}/${y.slice(2)}`;
}
function fmtForInput(iso) { return fmtDisplay(iso); }

function wireAutoDate(inp) {
  if (!inp || inp.dataset.wired) return;
  inp.dataset.wired = '1';
  inp.addEventListener('input', e => {
    let v = e.target.value.replace(/\D/g, '');
    if (v.length > 2) v = v.slice(0,2) + '/' + v.slice(2);
    if (v.length > 5) v = v.slice(0,5) + '/' + v.slice(5);
    e.target.value = v.slice(0,8);
  });
}

async function api(method, path, body) {
  const r = await fetch(SB_URL + '/rest/v1/' + path, {
    method, headers: HDRS, body: body ? JSON.stringify(body) : undefined });
  if (!r.ok) throw new Error(await r.text());
  if (r.status === 204) return null;
  return r.json();
}

// ── Calendar Feeds ──
const CAL_COLORS = ['#9CAF9A','#C4A4A0','#A67B5B','#C4B99A','#7A9478','#B8A898'];
const CORS_PROXY = 'https://corsproxy.io/?';
const WEEKDAY_IDX = { SU:0, MO:1, TU:2, WE:3, TH:4, FR:5, SA:6 };

function saveCalFeeds() { localStorage.setItem('tw_cal_feeds', JSON.stringify(calFeeds)); }

function parseDTVal(val) {
  if (!val) return null;
  const allDay = val.length === 8 || !val.includes('T');
  const y = +val.slice(0,4), mo = +val.slice(4,6)-1, d = +val.slice(6,8);
  const date = new Date(y, mo, d);
  let timeStr = null;
  if (!allDay) {
    const h = +val.slice(9,11), m = val.slice(11,13);
    const ampm = h >= 12 ? 'PM' : 'AM';
    timeStr = `${h % 12 || 12}:${m} ${ampm}`;
  }
  return { date, allDay, timeStr };
}

function expandEvent(ev, minD, maxD) {
  const start = parseDTVal(ev.dtstart);
  if (!start) return [];
  const startDate = start.date;
  const results = [];

  if (!ev.rrule) {
    const s = new Date(startDate); s.setHours(0,0,0,0);
    if (s >= minD && s <= maxD) results.push({ dk: dateKey(startDate), time: start.timeStr, allDay: start.allDay });
    return results;
  }

  const rr = {};
  ev.rrule.split(';').forEach(p => { const [k,v] = p.split('='); rr[k] = v; });
  const freq = rr.FREQ || 'WEEKLY';
  const interval = rr.INTERVAL ? +rr.INTERVAL : 1;
  const maxCount = rr.COUNT ? +rr.COUNT : 500;
  let untilDate = null;
  if (rr.UNTIL) { const u = parseDTVal(rr.UNTIL.replace(/[TZ]/g,'').slice(0,8)); if (u) untilDate = u.date; }
  const byDays = rr.BYDAY ? rr.BYDAY.split(',').map(s => WEEKDAY_IDX[s.replace(/^[+-]?\d*/,'')]).filter(n => n !== undefined) : null;

  if (freq === 'WEEKLY' && byDays && byDays.length > 1) {
    // Expand to each named weekday; iterate week by week
    const weekStart = new Date(startDate);
    weekStart.setDate(weekStart.getDate() - weekStart.getDay()); // back to Sunday
    let n = 0;
    while (weekStart <= maxD && n < maxCount) {
      byDays.forEach(dow => {
        const candidate = new Date(weekStart);
        candidate.setDate(weekStart.getDate() + dow);
        const cs = new Date(candidate); cs.setHours(0,0,0,0);
        if (candidate >= startDate && cs >= minD && cs <= maxD) {
          if (!untilDate || candidate <= untilDate) {
            results.push({ dk: dateKey(candidate), time: start.timeStr, allDay: start.allDay });
            n++;
          }
        }
      });
      weekStart.setDate(weekStart.getDate() + 7 * interval);
    }
  } else {
    const cursor = new Date(startDate);
    let n = 0;
    while (cursor <= maxD && n < maxCount) {
      const cs = new Date(cursor); cs.setHours(0,0,0,0);
      if (cs >= minD) results.push({ dk: dateKey(cursor), time: start.timeStr, allDay: start.allDay });
      n++;
      if (freq === 'DAILY') cursor.setDate(cursor.getDate() + interval);
      else if (freq === 'WEEKLY') cursor.setDate(cursor.getDate() + 7 * interval);
      else if (freq === 'MONTHLY') cursor.setMonth(cursor.getMonth() + interval);
      else if (freq === 'YEARLY') cursor.setFullYear(cursor.getFullYear() + interval);
      else break;
      if (untilDate && cursor > untilDate) break;
    }
  }
  return results;
}

function parseICS(text, feedColor) {
  text = text.replace(/\r?\n[ \t]/g, ''); // unfold
  const lines = text.split(/\r?\n/);
  const vevents = [];
  let ev = null;
  for (const raw of lines) {
    const ci = raw.indexOf(':');
    if (ci < 0) continue;
    const keyPart = raw.slice(0, ci);
    const val = raw.slice(ci + 1).trim();
    const propName = keyPart.split(';')[0].toUpperCase();
    if (propName === 'BEGIN' && val === 'VEVENT') { ev = {}; continue; }
    if (propName === 'END' && val === 'VEVENT') { if (ev && ev.summary && ev.dtstart) vevents.push(ev); ev = null; continue; }
    if (!ev) continue;
    if (propName === 'SUMMARY') ev.summary = val.replace(/\\([,;:\\])/g, '$1').replace(/\\n/gi, ' ').trim();
    if (propName === 'DTSTART') { ev.dtstart = val.replace(/[TZ]/g, s => s === 'T' ? 'T' : ''); ev.allDay = /VALUE=DATE/.test(keyPart) || val.length === 8; }
    if (propName === 'DTEND') ev.dtend = val;
    if (propName === 'RRULE') ev.rrule = val;
  }

  const today = new Date(); today.setHours(0,0,0,0);
  const minD = new Date(today); minD.setDate(minD.getDate() - 14);
  const maxD = new Date(today); maxD.setDate(maxD.getDate() + 90);

  const result = {};
  vevents.forEach(ev => {
    expandEvent(ev, minD, maxD).forEach(({ dk, time, allDay }) => {
      if (!result[dk]) result[dk] = [];
      result[dk].push({ title: ev.summary, time, allDay, color: feedColor });
    });
  });
  return result;
}

async function fetchFeed(feed) {
  const url = feed.url.replace(/^webcal:\/\//i, 'https://');
  try {
    const r = await fetch(CORS_PROXY + encodeURIComponent(url));
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const text = await r.text();
    if (!feed.name || feed.name === 'Loading…') {
      const m = text.match(/X-WR-CALNAME:(.+)/);
      if (m) { feed.name = m[1].trim(); saveCalFeeds(); }
      else feed.name = 'Calendar';
    }
    return parseICS(text, feed.color);
  } catch(e) {
    console.error('Cal feed error:', feed.url, e);
    showToast('Could not load calendar feed');
    return {};
  }
}

async function fetchAllFeeds() {
  if (calFeeds.length === 0) return;
  calEvents = {};
  await Promise.all(calFeeds.map(async feed => {
    const evs = await fetchFeed(feed);
    Object.entries(evs).forEach(([dk, arr]) => {
      if (!calEvents[dk]) calEvents[dk] = [];
      calEvents[dk].push(...arr);
    });
  }));
  renderWeek(); renderAgenda();
}

function openCalFeedsModal() {
  renderCalFeedsList();
  openModal('calFeedsModal');
}

function renderCalFeedsList() {
  const el = document.getElementById('calFeedsList');
  el.innerHTML = '';
  if (calFeeds.length === 0) {
    el.innerHTML = '<div style="color:var(--ink-faint);font-size:12px;font-style:italic;padding:6px 0">No feeds added yet.</div>';
    return;
  }
  calFeeds.forEach((f, i) => {
    const row = document.createElement('div');
    row.className = 'cal-feed-item';
    row.innerHTML = `
      <div class="cal-feed-color" style="background:${f.color}"></div>
      <div style="flex:1;overflow:hidden">
        <div class="cal-feed-name">${f.name || 'Untitled'}</div>
        <div class="cal-feed-url">${f.url}</div>
      </div>
      <button class="task-del" onclick="removeCalFeed(${i})">×</button>`;
    el.appendChild(row);
  });
}

async function addCalFeed() {
  const inp = document.getElementById('calFeedUrl');
  const url = inp.value.trim();
  if (!url) return;
  const color = CAL_COLORS[calFeeds.length % CAL_COLORS.length];
  const feed = { id: Date.now().toString(), url, name: 'Loading…', color };
  calFeeds.push(feed);
  saveCalFeeds();
  inp.value = '';
  renderCalFeedsList();
  const evs = await fetchFeed(feed);
  Object.entries(evs).forEach(([dk, arr]) => {
    if (!calEvents[dk]) calEvents[dk] = [];
    calEvents[dk].push(...arr);
  });
  renderCalFeedsList();
  renderWeek(); renderAgenda();
}

function removeCalFeed(i) {
  calFeeds.splice(i, 1);
  saveCalFeeds();
  renderCalFeedsList();
  fetchAllFeeds();
}

// ── Boot ──
async function boot() {
  applyContext();
  wireAutoDate(document.getElementById('editTaskDate'));
  try {
    [lists, tasks] = await Promise.all([
      api('GET','lists?order=created_at.asc'),
      api('GET','tasks?order=created_at.asc')
    ]);
    inboxItems = JSON.parse(localStorage.getItem('tw_inbox') || '[]');
    renderHub(); renderWeek(); renderInbox(); renderMiniCal(); renderAgenda();
    fetchAllFeeds();
  } catch(e) { showToast('Connection error'); console.error(e); }
  document.getElementById('loading').classList.add('hidden');
}

// ── Context ──
function setContext(ctx) {
  currentContext = ctx;
  localStorage.setItem('tw_context', ctx);
  applyContext();
  renderHub(); renderWeek();
}

function applyContext() {
  document.body.className = 'ctx-' + currentContext;
  document.getElementById('appMark').classList.toggle('active', currentContext === 'all');
  document.getElementById('ctxWork').classList.toggle('active', currentContext === 'work');
  document.getElementById('ctxHome').classList.toggle('active', currentContext === 'home');
  const titles = { work: 'Work Hub', home: 'Home', all: 'Hub' };
  const el = document.getElementById('hubTitle');
  if (el) el.textContent = titles[currentContext] || 'Hub';
}

// ── Nav ──
function switchTab(tab) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
  if (tab === 'week') renderWeek();
  if (tab === 'day') { renderMiniCal(); renderAgenda(); }
}

// ══════════════════════════════
// HUB
// ══════════════════════════════
function renderHub() {
  applyContext();
  const area = document.getElementById('hubScrollArea');
  area.innerHTML = '';
  const visible = getVisibleLists();
  document.getElementById('hubSub').textContent =
    visible.length === 0 ? 'Your task lists' : `${visible.length} list${visible.length !== 1 ? 's' : ''}`;

  if (currentContext === 'home') {
    // Flat list — no section grouping
    if (visible.length === 0) {
      area.innerHTML = '<div class="empty-section" style="padding:16px 0">No home lists yet.</div>';
    } else {
      visible.forEach(lst => area.appendChild(makeListBlock(lst)));
    }
    return;
  }

  // All mode: banner + Home section always shown + work sections
  if (currentContext === 'all') {
    const banner = document.createElement('div');
    banner.style.cssText = 'background:#EDE7DA;padding:8px 14px;margin-bottom:12px;border-radius:6px;font-family:Helvetica Neue,sans-serif;font-size:12px;color:#2E2118;';
    banner.textContent = 'Showing all contexts — Home + Work';
    area.appendChild(banner);
    const homeLists = lists.filter(l => (l.context || 'work') === 'home');
    area.appendChild(makeSectionBlock('HOME', '__home', homeLists, true));
    WORK_SECTIONS.forEach(sec => {
      const secLists = lists.filter(l => (l.section || 'Misc') === sec && (l.context || 'work') === 'work');
      if (secLists.length > 0) area.appendChild(makeSectionBlock(sec, sec, secLists, false));
    });
    return;
  }

  // Work sections
  WORK_SECTIONS.forEach(sec => {
    const secLists = lists.filter(l => (l.section || 'Misc') === sec && (l.context || 'work') === 'work');
    if (currentContext === 'work' || secLists.length > 0) {
      area.appendChild(makeSectionBlock(sec, sec, secLists, false));
    }
  });
}

function makeSectionBlock(label, key, secLists, isHome) {
  const collapsed = sectionCollapsed[key];

  const block = document.createElement('div');
  block.className = 'section-block';
  const hdr = document.createElement('div');
  hdr.className = 'section-hdr';
  hdr.innerHTML = `
    <div class="section-hdr-bar"></div>
    <div class="section-hdr-left">
      <span>${label.toUpperCase()}</span>
      <span style="color:var(--ink-faint);font-size:10px">${collapsed ? '▸' : '▾'}</span>
    </div>`;
  hdr.onclick = () => { sectionCollapsed[key] = !collapsed; renderHub(); };
  block.appendChild(hdr);

  if (!collapsed) {
    const body = document.createElement('div');
    body.className = 'section-body';
    if (secLists.length === 0) {
      body.innerHTML = '<div class="empty-section">No lists yet</div>';
    } else {
      secLists.forEach(lst => body.appendChild(makeListBlock(lst)));
    }
    block.appendChild(body);
  }
  return block;
}

function makeListBlock(lst) {
  const listTasks = tasks.filter(t => t.list_id === lst.id);
  const openTasks = listTasks.filter(t => !t.completed);
  const doneTasks = listTasks.filter(t => t.completed);
  const collapsed = listCollapsed[lst.id];
  const lctx = lst.context || 'work';

  const block = document.createElement('div');
  block.className = 'list-block';

  const hdr = document.createElement('div');
  hdr.className = 'list-hdr';
  hdr.innerHTML = `
    ${currentContext === 'all' ? `<span class="list-dot ${lctx}"></span>` : ''}
    <span class="list-name">${lst.name}</span>
    ${openTasks.length > 0 ? `<span class="list-count">${openTasks.length}</span>` : ''}
    <button class="list-del" onclick="event.stopPropagation();deleteList('${lst.id}','${lst.name}')" title="Delete list">✕</button>`;
  hdr.onclick = () => { listCollapsed[lst.id] = !collapsed; renderHub(); };
  block.appendChild(hdr);

  if (!collapsed) {
    const body = document.createElement('div');
    body.className = 'list-body';

    const inputRow = document.createElement('div');
    inputRow.className = 'task-input-row';
    inputRow.innerHTML = `
      <input class="task-input" placeholder="Add a task…" id="ti_${lst.id}" inputmode="text" autocomplete="off" />
      <input class="due-input" type="text" id="td_${lst.id}" placeholder="MM/DD/YY" maxlength="8" inputmode="numeric" />
      <button class="btn btn-sm btn-primary" onclick="addTask('${lst.id}')">Add</button>`;
    body.appendChild(inputRow);

    setTimeout(() => {
      const ti = document.getElementById(`ti_${lst.id}`);
      const td = document.getElementById(`td_${lst.id}`);
      if (ti) ti.onkeydown = e => { if (e.key === 'Enter') addTask(lst.id); };
      if (td) wireAutoDate(td);
    }, 0);

    if (openTasks.length === 0) {
      const emp = document.createElement('div');
      emp.className = 'no-tasks'; emp.textContent = 'No open tasks';
      body.appendChild(emp);
    } else {
      openTasks.forEach(t => body.appendChild(makeTaskRow(t)));
    }

    if (doneTasks.length > 0) {
      const doneSection = document.createElement('div');
      doneSection.className = 'done-section';
      const doneHdr = document.createElement('div');
      doneHdr.className = 'done-hdr';
      doneHdr.innerHTML = `<span>${doneTasks.length} completed</span>
        <button class="btn btn-sm" onclick="clearCompleted('${lst.id}')">Clear completed</button>`;
      doneSection.appendChild(doneHdr);
      doneTasks.forEach(t => doneSection.appendChild(makeTaskRow(t)));
      body.appendChild(doneSection);
    }

    body.appendChild(Object.assign(document.createElement('hr'), {className: 'divider'}));
    block.appendChild(body);
  }
  return block;
}

function makeTaskRow(task) {
  const row = document.createElement('div');
  row.className = 'task-row';
  const done = task.completed;

  const check = document.createElement('div');
  check.className = 'task-check' + (done ? ' done' : '');
  check.onclick = () => toggleTask(task.id);

  const text = document.createElement('div');
  text.className = 'task-text' + (done ? ' done' : '');
  text.textContent = task.title;

  row.appendChild(check);
  row.appendChild(text);

  if (task.due_date) {
    const today = new Date(); today.setHours(0,0,0,0);
    const due = new Date(task.due_date + 'T00:00:00');
    const diff = Math.round((due - today) / 86400000);
    const badge = document.createElement('span');
    badge.className = 'due-badge';
    if (diff < 0) { badge.classList.add('overdue'); badge.textContent = `Overdue ${fmtDisplay(task.due_date)}`; }
    else if (diff === 0) { badge.classList.add('today'); badge.textContent = 'Today'; }
    else if (diff === 1) { badge.classList.add('soon'); badge.textContent = 'Tomorrow'; }
    else { badge.classList.add('soon'); badge.textContent = fmtDisplay(task.due_date); }
    row.appendChild(badge);
  }

  const editBtn = document.createElement('button');
  editBtn.className = 'task-edit'; editBtn.title = 'Edit task'; editBtn.textContent = '✎';
  editBtn.onclick = () => openEditTaskModal(task.id);

  const del = document.createElement('button');
  del.className = 'task-del'; del.textContent = '×';
  del.onclick = () => deleteTask(task.id);

  row.appendChild(editBtn);
  row.appendChild(del);
  return row;
}

async function addTask(listId) {
  const ti = document.getElementById(`ti_${listId}`);
  const td = document.getElementById(`td_${listId}`);
  const title = ti.value.trim();
  if (!title) return;
  const due_date = parseDate(td.value);
  ti.value = ''; td.value = '';
  try {
    const [t] = await api('POST', 'tasks', { list_id: listId, title, completed: false, due_date });
    tasks.push(t);
    renderHub(); renderWeek();
  } catch(e) { showToast('Error adding task'); }
}

async function toggleTask(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  t.completed = !t.completed;
  renderHub(); renderWeek(); renderAgenda();
  await api('PATCH', `tasks?id=eq.${id}`, { completed: t.completed });
}

async function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  renderHub(); renderWeek();
  await api('DELETE', `tasks?id=eq.${id}`);
}

async function clearCompleted(listId) {
  const ids = tasks.filter(t => t.list_id === listId && t.completed).map(t => t.id);
  tasks = tasks.filter(t => !(t.list_id === listId && t.completed));
  renderHub(); renderWeek();
  for (const id of ids) await api('DELETE', `tasks?id=eq.${id}`);
}

async function deleteList(id, name) {
  if (!confirm(`Delete "${name}" and all its tasks?`)) return;
  tasks = tasks.filter(t => t.list_id !== id);
  lists = lists.filter(l => l.id !== id);
  renderHub(); renderWeek();
  await api('DELETE', `tasks?list_id=eq.${id}`);
  await api('DELETE', `lists?id=eq.${id}`);
}

function collapseAll() { WORK_SECTIONS.forEach(s => sectionCollapsed[s] = true); sectionCollapsed['__home'] = true; renderHub(); }
function expandAll() { WORK_SECTIONS.forEach(s => sectionCollapsed[s] = false); sectionCollapsed['__home'] = false; lists.forEach(l => listCollapsed[l.id] = false); renderHub(); }

// ── New List ──
function openNewListModal() {
  document.getElementById('newListName').value = '';
  document.getElementById('newListSectionRow').style.display = currentContext === 'home' ? 'none' : '';
  openModal('newListModal');
  setTimeout(() => document.getElementById('newListName').focus(), 200);
}

async function confirmNewList() {

// ── Edit Task ──
function openEditTaskModal(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  editingTaskId = id;
  document.getElementById('editTaskTitle').value = t.title;
  document.getElementById('editTaskDate').value = fmtForInput(t.due_date);
  openModal('editTaskModal');
  setTimeout(() => document.getElementById('editTaskTitle').focus(), 200);
}

async function confirmEditTask() {
  const title = document.getElementById('editTaskTitle').value.trim();
  if (!title) return;
  const due_date = parseDate(document.getElementById('editTaskDate').value);
  const t = tasks.find(t => t.id === editingTaskId);
  if (!t) return;
  t.title = title; t.due_date = due_date;
  closeModal('editTaskModal');
  renderHub(); renderWeek(); renderAgenda();
  await api('PATCH', `tasks?id=eq.${editingTaskId}`, { title, due_date });
}

// ══════════════════════════════
// WEEK
// ══════════════════════════════
function getWeekDays() {
  const today = new Date(); today.setHours(0,0,0,0);
  const sunday = new Date(today);
  sunday.setDate(today.getDate() - today.getDay() + weekOffset * 7);
  return Array.from({length:7}, (_, i) => { const d = new Date(sunday); d.setDate(sunday.getDate() + i); return d; });
}

function weekNav(delta) {
  weekOffset = delta === 0 ? 0 : weekOffset + delta;
  renderWeek();
}

async function dropTaskOnDay(taskId, key) {
  const t = tasks.find(t => t.id === taskId);
  if (t) { t.week_assigned = key; t.due_date = key; }
  renderWeek(); renderHub(); renderMiniCal();
  await api('PATCH', `tasks?id=eq.${taskId}`, { week_assigned: key, due_date: key });
  showToast('Task assigned');
}

function renderWeek() {
  const days = getWeekDays();
  const todayKey = dateKey(new Date());
  document.getElementById('weekSub').textContent =
    `${days[0].toLocaleDateString('en-US',{month:'short',day:'numeric'})} – ${days[6].toLocaleDateString('en-US',{month:'short',day:'numeric'})}`;

  const ctrl = document.getElementById('weekControls');
  ctrl.innerHTML = '';

  // Navigation buttons
  const navRow = document.createElement('div');
  navRow.className = 'week-nav-row';
  navRow.innerHTML = `
    <button class="btn btn-sm" onclick="weekNav(-1)">‹ Prev</button>
    ${weekOffset !== 0 ? `<button class="btn btn-sm btn-accent" onclick="weekNav(0)">Today</button>` : ''}
    <button class="btn btn-sm" onclick="weekNav(1)">Next ›</button>`;
  ctrl.appendChild(navRow);

  // List filter
  const visLists = getVisibleLists();
  const filterRow = document.createElement('div');
  filterRow.style.cssText = 'display:flex;gap:6px;flex-wrap:wrap;';
  [['all','All'], ...visLists.map(l => [l.id, l.name])].forEach(([key, label]) => {
    const btn = document.createElement('button');
    btn.className = 'btn btn-sm' + (activeWeekList === key ? ' btn-primary' : '');
    btn.textContent = label;
    btn.onclick = () => { activeWeekList = key; renderWeek(); };
    filterRow.appendChild(btn);
  });
  ctrl.appendChild(filterRow);

  // Pending chips
  const chips = document.getElementById('pendingChips');
  chips.innerHTML = '';
  const visListIds = new Set(visLists.map(l => l.id));
  const unassigned = tasks.filter(t => !t.week_assigned && !t.completed &&
    visListIds.has(t.list_id) &&
    (activeWeekList === 'all' || t.list_id === activeWeekList));

  if (unassigned.length === 0) {
    chips.innerHTML = '<span style="font-family:Helvetica Neue,sans-serif;font-size:12px;color:var(--ink-faint)">All tasks assigned ✓</span>';
  } else {
    unassigned.forEach(t => {
      const chip = document.createElement('div');
      chip.className = 'chip';
      chip.textContent = t.title + (t.due_date ? ` · ${fmtDisplay(t.due_date)}` : '');
      chip.draggable = true;
      setupChipDrag(chip, t.id);
      chips.appendChild(chip);
    });
  }

  // Day columns
  const grid = document.getElementById('weekGrid');
  grid.innerHTML = '';
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  days.forEach((day, i) => {
    const key = dateKey(day);
    const isToday = key === todayKey;

    const col = document.createElement('div');
    col.className = 'day-col' + (isToday ? ' today' : '');

    const hdr = document.createElement('div');
    hdr.className = 'day-hdr';
    hdr.innerHTML = `<span class="day-hdr-name">${dayNames[i]}</span><span class="day-hdr-date">${day.getDate()}</span>`;
    col.appendChild(hdr);

    const body = document.createElement('div');
    body.className = 'day-body';
    body.dataset.daykey = key;
    setupDropZone(body, key);

    // Tasks assigned or due on this day (from visible lists + active filter)
    const dayTasks = tasks.filter(t =>
      visListIds.has(t.list_id) &&
      (activeWeekList === 'all' || t.list_id === activeWeekList) &&
      (t.week_assigned === key || (!t.week_assigned && t.due_date === key))
    );

    const dayCalEvs = (calEvents[key] || []).slice().sort((a, b) => {
      if (a.allDay && !b.allDay) return -1;
      if (!a.allDay && b.allDay) return 1;
      return (a.time || '').localeCompare(b.time || '');
    });
    dayCalEvs.forEach(ev => {
      const el = document.createElement('div');
      el.className = 'cal-event';
      el.style.background = ev.color;
      if (ev.time) {
        const ts = document.createElement('span'); ts.className = 'cal-event-time'; ts.textContent = ev.time;
        el.appendChild(ts);
      }
      const tt = document.createElement('span'); tt.className = 'cal-event-title'; tt.textContent = ev.title;
      el.appendChild(tt);
      body.appendChild(el);
    });
    if (dayTasks.length === 0) {
      body.appendChild(Object.assign(document.createElement('div'), { className: 'day-empty', textContent: 'Drop here' }));
    } else {
      dayTasks.forEach(t => body.appendChild(makeWeekCard(t, key)));
    }

    col.appendChild(body);
    grid.appendChild(col);
  });
}

function setupChipDrag(chip, taskId) {
  chip.draggable = true;
  chip.addEventListener('dragstart', e => { dragTaskId = taskId; chip.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
  chip.addEventListener('dragend', () => { dragTaskId = null; chip.classList.remove('dragging'); });
  chip.addEventListener('touchstart', () => { dragTaskId = taskId; chip.classList.add('dragging'); }, { passive: true });
  chip.addEventListener('touchmove', touchMoveHandler, { passive: false });
  chip.addEventListener('touchend', e => { chip.classList.remove('dragging'); touchEndHandler(e); }, { passive: true });
}

function setupDropZone(body, key) {
  body.addEventListener('dragover', e => { e.preventDefault(); body.classList.add('drag-over'); });
  body.addEventListener('dragleave', () => body.classList.remove('drag-over'));
  body.addEventListener('drop', async e => {
    e.preventDefault(); body.classList.remove('drag-over');
    if (dragTaskId) { await dropTaskOnDay(dragTaskId, key); dragTaskId = null; }
  });
}

function touchMoveHandler(e) {
  e.preventDefault();
  const touch = e.touches[0];
  document.querySelectorAll('.day-body').forEach(b => b.classList.remove('drag-over'));
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  const body = el && el.closest('.day-body');
  if (body) body.classList.add('drag-over');
}

function touchEndHandler(e) {
  document.querySelectorAll('.day-body').forEach(b => b.classList.remove('drag-over'));
  const touch = e.changedTouches[0];
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  const body = el && el.closest('.day-body');
  if (body && dragTaskId) dropTaskOnDay(dragTaskId, body.dataset.daykey);
  dragTaskId = null;
}

function makeWeekCard(t, dayKey) {
  const lst = lists.find(l => l.id === t.list_id);
  const card = document.createElement('div');
  card.className = 'week-task' + (t.completed ? ' done' : '');
  card.draggable = true;

  const done = t.completed;
  card.innerHTML = `
    <div class="week-task-title${done ? ' done' : ''}">${t.title}</div>
    <div class="week-task-meta">
      <span class="week-task-list">${lst ? lst.name : ''}</span>
      ${t.due_date ? `<span class="week-task-date">${fmtDisplay(t.due_date)}</span>` : ''}
      <button class="week-task-remove" title="Remove from week">×</button>
    </div>`;

  card.addEventListener('dragstart', e => {
    dragTaskId = t.id; card.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move'; e.stopPropagation();
  });
  card.addEventListener('dragend', () => { dragTaskId = null; card.classList.remove('dragging'); });
  card.addEventListener('touchstart', () => { dragTaskId = t.id; card.classList.add('dragging'); }, { passive: true });
  card.addEventListener('touchmove', touchMoveHandler, { passive: false });
  card.addEventListener('touchend', e => { card.classList.remove('dragging'); touchEndHandler(e); }, { passive: true });

  card.querySelector('.week-task-remove').onclick = async e => {
    e.stopPropagation();
    t.week_assigned = null; t.due_date = null;
    renderWeek(); renderHub();
    await api('PATCH', `tasks?id=eq.${t.id}`, { week_assigned: null, due_date: null });
  };
  return card;
}

// ══════════════════════════════
// DAY VIEW
// ══════════════════════════════
function renderMiniCal() {
  const year = miniMonthDate.getFullYear();
  const month = miniMonthDate.getMonth();
  const todayKey = dateKey(new Date());

  document.getElementById('miniCalTitle').textContent =
    miniMonthDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

  const grid = document.getElementById('miniCalGrid');
  grid.innerHTML = '';
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'mini-cal-dow'; el.textContent = d;
    grid.appendChild(el);
  });

  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const pad = firstDay.getDay();

  for (let i = 0; i < pad; i++) {
    const d = new Date(year, month, 1 - pad + i);
    const el = document.createElement('div');
    el.className = 'mini-cal-day other-month';
    el.textContent = d.getDate();
    el.onclick = () => selectDay(dateKey(d));
    grid.appendChild(el);
  }

  for (let d = 1; d <= lastDay.getDate(); d++) {
    const dt = new Date(year, month, d);
    const key = dateKey(dt);
    const el = document.createElement('div');
    el.className = 'mini-cal-day';
    if (key === todayKey) el.classList.add('is-today');
    if (key === selectedDay) el.classList.add('is-selected');
    if (tasks.some(t => (t.week_assigned === key || t.due_date === key) && !t.completed))
      el.classList.add('has-tasks');
    el.textContent = d;
    el.onclick = () => selectDay(key);
    grid.appendChild(el);
  }

  // Update subtitle
  const sub = document.getElementById('daySub');
  if (sub) {
    const sd = new Date(selectedDay + 'T00:00:00');
    sub.textContent = sd.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
  }
}

function miniCalPrev() {
  miniMonthDate = new Date(miniMonthDate.getFullYear(), miniMonthDate.getMonth() - 1, 1);
  renderMiniCal();
}
function miniCalNext() {
  miniMonthDate = new Date(miniMonthDate.getFullYear(), miniMonthDate.getMonth() + 1, 1);
  renderMiniCal();
}

function selectDay(key) {
  selectedDay = key;
  renderMiniCal();
  renderAgenda();
}

function renderAgenda() {
  const agenda = document.getElementById('dayAgenda');
  if (!agenda) return;
  agenda.innerHTML = '';

  const sd = new Date(selectedDay + 'T00:00:00');
  const title = document.createElement('div');
  title.className = 'agenda-day-title';
  title.textContent = sd.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
  agenda.appendChild(title);

  // Tasks due/assigned this day
  const visListIds = new Set(getVisibleLists().map(l => l.id));
  const dayTasks = tasks.filter(t =>
    visListIds.has(t.list_id) && !t.completed &&
    (t.week_assigned === selectedDay || t.due_date === selectedDay)
  );

  if (dayTasks.length > 0) {
    const lbl = document.createElement('div');
    lbl.className = 'agenda-section-label'; lbl.textContent = 'Tasks';
    agenda.appendChild(lbl);
    dayTasks.forEach(t => {
      const lst = lists.find(l => l.id === t.list_id);
      const row = document.createElement('div');
      row.className = 'agenda-task';
      const check = document.createElement('div');
      check.className = 'task-check';
      check.onclick = () => { toggleTask(t.id); };
      const info = document.createElement('div');
      info.className = 'agenda-task-info';
      info.innerHTML = `<div class="agenda-task-title">${t.title}</div>
                        <div class="agenda-task-list">${lst ? lst.name : ''}</div>`;
      row.appendChild(check);
      row.appendChild(info);
      agenda.appendChild(row);
    });
  }

  // Cal events for this day
  const agendaCalEvs = (calEvents[selectedDay] || []).slice().sort((a, b) => {
    if (a.allDay && !b.allDay) return -1;
    if (!a.allDay && b.allDay) return 1;
    return (a.time || '').localeCompare(b.time || '');
  });
  if (agendaCalEvs.length > 0) {
    const lbl = document.createElement('div');
    lbl.className = 'agenda-section-label'; lbl.textContent = 'Events';
    agenda.appendChild(lbl);
    agendaCalEvs.forEach(ev => {
      const row = document.createElement('div');
      row.className = 'agenda-cal-event';
      row.style.borderLeft = `3px solid ${ev.color}`;
      if (ev.time) {
        const t = document.createElement('div'); t.className = 'agenda-cal-time'; t.textContent = ev.time;
        row.appendChild(t);
      }
      const ttl = document.createElement('div'); ttl.className = 'agenda-cal-title'; ttl.textContent = ev.title;
      row.appendChild(ttl);
      agenda.appendChild(row);
    });
  }

  if (dayTasks.length === 0 && agendaCalEvs.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'agenda-empty';
    empty.textContent = 'Nothing scheduled for this day.';
    agenda.appendChild(empty);
  }
}

// ══════════════════════════════
// INBOX
// ══════════════════════════════
function renderInbox() {
  const list = document.getElementById('inboxList');
  list.innerHTML = '';
  if (inboxItems.length === 0) {
    list.innerHTML = '<div class="no-tasks">No items. Add tasks you need to assign to a list.</div>';
    return;
  }
  inboxItems.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'inbox-item';

    const check = document.createElement('div');
    check.className = 'inbox-check' + (item.done ? ' done' : '');
    check.onclick = () => { inboxItems[i].done = !inboxItems[i].done; saveInbox(); renderInbox(); };

    const text = document.createElement('div');
    text.className = 'inbox-item-text' + (item.done ? ' done' : '');
    text.textContent = item.text;

    const assign = document.createElement('button');
    assign.className = 'btn btn-sm'; assign.textContent = 'Assign →';
    assign.onclick = () => openMoveModal(i);

    const del = document.createElement('button');
    del.className = 'task-del'; del.textContent = '×';
    del.onclick = () => { inboxItems.splice(i, 1); saveInbox(); renderInbox(); };

    row.appendChild(check); row.appendChild(text); row.appendChild(assign); row.appendChild(del);
    list.appendChild(row);
  });
}

function addInboxItem() {
  const inp = document.getElementById('inboxInput');
  const val = inp.value.trim(); if (!val) return;
  inp.value = '';
  inboxItems.unshift({ text: val, done: false });
  saveInbox(); renderInbox();
}

function saveInbox() { localStorage.setItem('tw_inbox', JSON.stringify(inboxItems)); }

function openMoveModal(i) {
  if (lists.length === 0) { showToast('Create a list first'); return; }
  pendingMoveIdx = i;
  const sel = document.getElementById('moveSelect');
  const opts = getVisibleLists().length ? getVisibleLists() : lists;
  sel.innerHTML = opts.map(l => `<option value="${l.id}">${l.name}</option>`).join('');
  openModal('moveModal');
}

async function confirmMove() {
  const listId = document.getElementById('moveSelect').value;
  const item = inboxItems[pendingMoveIdx];
  closeModal('moveModal');
  inboxItems[pendingMoveIdx].done = true;
  saveInbox(); renderInbox();
  try {
    const [t] = await api('POST', 'tasks', { list_id: listId, title: item.text, completed: false });
    tasks.push(t); renderHub(); renderWeek(); showToast('Assigned to list ✓');
  } catch(e) { showToast('Error'); }
}

// ── Modals ──
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(el =>
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); }));

// ── Toast ──
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

boot();
</script>
</body>
</html>
